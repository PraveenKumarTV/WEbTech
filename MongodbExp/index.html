<html ng-app="MovieTicketBooking">
    <head>
        <meta charset="UTF-8">
        <title>Movie Ticket Booking</title>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
        <link rel="stylesheet" href="styles.css">
        <script src="app.js"></script>
    </head>
<body ng-controller="Mctrl">
    <div class="container">
        <form ng-submit="insertMovie()">
            <h1>Insert Movie</h1>
        <input type="text" ng-model="name1" placeholder="Enter movie name" required>
        <input type="text" ng-model="genre1" placeholder="Enter movie genre" required>
        <button type="submit">Add Movie</button>
        </form>
    </div><br><br><br>
    <div class="container">
        <form>
            <h1>Edit Movie details</h1>
            <input type="text" ng-model="name2" placeholder="Enter movie name to be edited" required>
            <input type="text" ng-model="genre2" placeholder="Enter new genre" required>
            <button ng-click="editMovie()">Edit Movie</button>
        </form>
    </div><br><br><br>
    <div class="container">
        <form>
            <h1>Delete Movie</h1>
            <input type="text" ng-model="name3" placeholder="Enter movie name to be deleted" required>
            <button ng-click="deleteMovie()">Delete Movie</button>
        </form>

    </div>
    <div class="container">
        <h2>Movies List</h2>
        <div ng-repeat="m in movies">
            <movie-display movie="m"></movie-display>
        </div>
    </div>
</body>
</html>
